version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: giftos-postgres
    environment:
      POSTGRES_USER: giftos
      POSTGRES_PASSWORD: giftos
      POSTGRES_DB: giftos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U giftos"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: giftos-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: giftos-api
    environment:
      - DATABASE_URL=postgresql+asyncpg://giftos:giftos@postgres:5432/giftos
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src:ro
    command: uvicorn giftos.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: giftos-worker
    environment:
      - DATABASE_URL=postgresql+asyncpg://giftos:giftos@postgres:5432/giftos
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src:ro
    command: celery -A giftos.celery_app worker --loglevel=info

  beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: giftos-beat
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./src:/app/src:ro
    command: celery -A giftos.celery_app beat --loglevel=info

volumes:
  postgres_data:
  redis_data:
